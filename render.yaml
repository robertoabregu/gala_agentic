services:
  - type: web
    name: gala-agentic
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -k gthread --threads 4 --timeout 120 --workers 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: MIN_CHUNK_SIZE
        value: "500"
      - key: MAX_CHUNK_SIZE
        value: "800"
      - key: RAG_SCORE_THRESHOLD
        value: "0.5"
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
